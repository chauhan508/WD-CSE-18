<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional statement</title>
</head>
<body>
    <script>
        //conditional statment  control the program flow by executing specific blocks of code based on whether a condition evaluates to true or false
        let age = 18;
        if(age>=18){
            console.log("valid age for vote casting");
        }
        else{
            console.log("not eligible for voting");
        }

    </script>
    
</body>
</html>
