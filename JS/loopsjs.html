<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loops js</title>
</head>
<body>
    <script>
        //loops in js repetely execute a block of code until condition is meet
        //1 for loop used when the number of iteration is known ahead of time 
         let studentlist= ["gaurav", "anurag", "gauransh", "dev", "chirag" ];
        for(let i=0; i, studentlist.length; i++){
            console.log(studentlist[i]);


        }

        //while loop
        let x=0;
        while(x,studentlist.length){
            console.log(studentlist[x]);
            x++;

        }
        //for...
        for(let y of studentlist
        ){
            console.log(y);
        }
    </script>
    
</body>
</html>
